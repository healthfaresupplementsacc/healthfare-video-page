<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HealthFare Videos</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white;
      font-family: Arial, sans-serif;
    }

    .ticker {
      width: 100%;
      height: 60px;
      overflow: hidden;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
    }

    .ticker-text {
      white-space: nowrap;
      font-size: 22px;
      font-weight: bold;
      padding-left: 100%;
      animation: scrollText 120s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .video-container {
      height: calc(100vh - 60px);
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

<div class="ticker">
  <div class="ticker-text" id="tickerText"></div>
</div>

<div class="video-container">
  <video id="player" muted playsinline></video>
</div>

<script>
const player = document.getElementById("player");

let videos = [];
let index = 0;

/* MESSAGE */
fetch("message.txt")
  .then(res => res.text())
  .then(text => {
    document.getElementById("tickerText").innerText =
      (text.trim() + " • ").repeat(15);
  });

/* 🔥 FIX BROKEN ENCODING */
function fixUrl(url) {
  return url
    .replace(/%E2%94%9C%C2%BA%E2%94%9C%C3%BA/g, "%C3%A7%C3%A3") // Narração fix
    .replace(/%E2%94%9C%C2%BA/g, "%C3%A7") // fallback
    .replace(/%E2%94%9C%C3%BA/g, "%C3%A3") // fallback
    .replace(/%20%20/g, "%20") // double space fix
    .replace(/\.{2}\.mp4/g, ".mp4"); // double dot fix
}

/* LOAD CSV */
fetch("links.csv")
  .then(res => res.text())
  .then(data => {
    const lines = data.split(/\r?\n/).slice(1);

    videos = lines
      .map(l => l.replace(/"/g, "").trim())
      .filter(l => l.length > 10)
      .map(fixUrl); // 🔥 APPLY FIX HERE

    videos = shuffle(videos);

    console.log("TOTAL VIDEOS:", videos.length);

    if (videos.length > 0) {
      playVideo(0);
    }
  });

function playVideo(i) {
  if (!videos[i]) return nextVideo();

  const url = videos[i];

  console.log("PLAYING:", url);

  player.src = url;
  player.load();

  player.play().catch(() => {
    setTimeout(nextVideo, 500);
  });
}

function nextVideo() {
  index = (index + 1) % videos.length;
  playVideo(index);
}

/* EVENTS */
player.addEventListener("ended", nextVideo);

player.addEventListener("error", () => {
  console.log("ERROR SKIP");
  nextVideo();
});

/* FAILSAFE */
setInterval(() => {
  if (player.paused || player.readyState === 0) {
    nextVideo();
  }
}, 8000);

/* SHUFFLE */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}
</script>

</body>
</html>
