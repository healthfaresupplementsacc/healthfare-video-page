<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HealthFare Videos</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white;
      font-family: Arial;
    }

    /* TICKER */
    .ticker {
      width: 100%;
      height: 60px;
      overflow: hidden;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
    }

    .ticker-text {
      white-space: nowrap;
      font-size: 22px;
      font-weight: bold;
      color: #111;
      padding-left: 100%;
      display: inline-block;
      animation: scrollText 90s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* VIDEO FULL AREA */
    .video-container {
      height: calc(100vh - 60px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

<div class="ticker">
  <div class="ticker-text" id="tickerText"></div>
</div>

<div class="video-container">
  <video id="player" autoplay muted playsinline></video>
</div>

<script>
/* MESSAGE */
fetch("message.txt")
  .then(res => res.text())
  .then(text => {
    const clean = text.trim();
    document.getElementById("tickerText").innerText =
      (clean + " • ").repeat(10);
  });

/* VIDEO */
const player = document.getElementById("player");

let videos = [];
let index = 0;

fetch("links.csv")
  .then(res => res.text())
  .then(data => {
    const lines = data.split(/\r?\n/).slice(1);

    videos = lines
      .map(l => l.replace(/\r/g, "").trim())
      .filter(l => l.startsWith("http"));

    if (videos.length > 0) {
      playVideo(0);
    } else {
      alert("No videos loaded - check links.csv");
    }
  });

function playVideo(i) {
  player.src = encodeURI(videos[i]);
  player.load();
  player.play().catch(() => {});
}

player.addEventListener("ended", () => {
  index = (index + 1) % videos.length;
  playVideo(index);
});
</script>

</body>
</html>
