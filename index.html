<script>
const player = document.getElementById("player");
const ticker = document.getElementById("tickerText");

let videos = [];
let index = 0;
let lastProgress = Date.now();

/* ---------------- TICKER ---------------- */

fetch("message.txt?v=" + Date.now())
  .then(res => res.text())
  .then(text => {
    const content = (text.trim() + "     •     ").repeat(20);
    ticker.innerText = content;
    startTicker();
  });

function startTicker() {
  const speed = 200;

  let position = window.innerWidth;
  let lastTime = performance.now();

  function animate(now) {
    const delta = (now - lastTime) / 1000;
    lastTime = now;

    position -= speed * delta;

    if (position < -ticker.scrollWidth) {
      position = window.innerWidth;
    }

    const rounded = Math.round(position);
    ticker.style.transform = `translate3d(${rounded}px, 0, 0)`;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

/* ---------------- VIDEO SYSTEM ---------------- */

/* CLEAN URL FIX */
function fixUrl(url) {
  return url
    .replace(/\.{2}\.mp4/g, ".mp4")
    .trim();
}

/* LOAD VIDEOS (NO VALIDATION) */
fetch("links.csv?v=" + Date.now())
  .then(res => res.text())
  .then(data => {
    const lines = data.split(/\r?\n/).slice(1);

    videos = lines
      .map(l => l.replace(/"/g, "").trim())
      .filter(l => l.length > 10)
      .map(fixUrl);

    videos = shuffle(videos);

    if (videos.length > 0) {
      playVideo(0);
    } else {
      alert("No videos found");
    }
  });

/* STRONG PLAY FUNCTION */
function playVideo(i) {
  if (!videos[i]) return nextVideo();

  const url = videos[i];
  console.log("PLAYING:", url);

  player.src = url;
  player.load();

  setTimeout(() => {
    player.play().catch(() => nextVideo());
  }, 200);
}

/* NEXT */
function nextVideo() {
  index = (index + 1) % videos.length;
  playVideo(index);
}

/* EVENTS */
player.addEventListener("ended", nextVideo);
player.addEventListener("error", nextVideo);

/* TRACK PROGRESS */
player.addEventListener("timeupdate", () => {
  lastProgress = Date.now();
});

/* DETECT FREEZE */
setInterval(() => {
  if (Date.now() - lastProgress > 7000) {
    console.log("Frozen → skipping");
    nextVideo();
  }
}, 3000);

/* SHUFFLE */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}
</script>
