<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HealthFare Videos</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      font-family: Arial, sans-serif;
    }

    /* VIDEO */
    .video-container {
      height: 100vh;
      width: 100%;
      position: relative;
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    /* TICKER */
    .ticker {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 12vh;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      overflow: hidden;
      padding-left: 2vw;
    }

    .ticker-text {
      position: absolute;
      white-space: nowrap;

      font-size: clamp(32px, 4vw, 90px);
      font-weight: 700;
      color: white;
      letter-spacing: 1px;

      will-change: transform;
      transform: translateZ(0);
      backface-visibility: hidden;
    }
  </style>
</head>

<body>

<div class="video-container">
  <video id="player" muted playsinline autoplay></video>

  <div class="ticker">
    <div class="ticker-text" id="tickerText"></div>
  </div>
</div>

<script>
const player = document.getElementById("player");
const ticker = document.getElementById("tickerText");

let videos = [];
let index = 0;
let lastProgress = Date.now();

/* ---------- TICKER ---------- */

fetch("message.txt?v=" + Date.now())
  .then(res => res.text())
  .then(text => {
    const content = (text.trim() + "     •     ").repeat(20);
    ticker.innerText = content;
    startTicker();
  })
  .catch(err => console.log("Ticker error:", err));

function startTicker() {
  const speed = 200;

  let position = window.innerWidth;
  let lastTime = performance.now();

  function animate(now) {
    const delta = (now - lastTime) / 1000;
    lastTime = now;

    position -= speed * delta;

    if (position < -ticker.scrollWidth) {
      position = window.innerWidth;
    }

    ticker.style.transform = `translate3d(${Math.round(position)}px,0,0)`;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

/* ---------- VIDEO SYSTEM ---------- */

function cleanUrl(url) {
  return url
    .replace(/"/g, "")
    .replace(/\.{2}\.mp4/g, ".mp4")
    .trim();
}

fetch("links.csv?v=" + Date.now())
  .then(res => res.text())
  .then(data => {

    const lines = data.split(/\r?\n/);

    videos = lines
      .slice(1)
      .map(cleanUrl)
      .filter(l => l.startsWith("http"));

    console.log("VIDEOS FOUND:", videos.length);

    if (videos.length === 0) {
      alert("No valid videos found");
      return;
    }

    videos = shuffle(videos);

    playVideo(0);
  })
  .catch(err => {
    console.error("CSV ERROR:", err);
    alert("Error loading links.csv");
  });

function playVideo(i) {
  if (!videos[i]) return nextVideo();

  const url = videos[i];

  console.log("PLAYING:", url);

  player.src = url;
  player.load();

  setTimeout(() => {
    player.play().catch(() => nextVideo());
  }, 200);
}

function nextVideo() {
  index = (index + 1) % videos.length;
  playVideo(index);
}

player.addEventListener("ended", nextVideo);
player.addEventListener("error", nextVideo);

player.addEventListener("timeupdate", () => {
  lastProgress = Date.now();
});

/* FREEZE DETECTION */
setInterval(() => {
  if (Date.now() - lastProgress > 7000) {
    console.log("Frozen → skipping");
    nextVideo();
  }
}, 3000);

/* SHUFFLE */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}
</script>

</body>
</html>
