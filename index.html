<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HealthFare Videos</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white;
      font-family: Arial, sans-serif;
    }

    /* ---------- TICKER ---------- */
    .ticker {
      width: 100%;
      height: 90px;
      overflow: hidden;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      position: relative;
      padding-left: 20px;
    }

    .ticker-text {
      position: absolute;
      white-space: nowrap;
      font-size: 34px; /* bigger for TV */
      font-weight: 600;
      color: #111;
      letter-spacing: 0.5px;
    }

    /* ---------- VIDEO ---------- */
    .video-container {
      height: calc(100vh - 90px);
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

<div class="ticker">
  <div class="ticker-text" id="tickerText"></div>
</div>

<div class="video-container">
  <video id="player" muted playsinline autoplay></video>
</div>

<script>
const player = document.getElementById("player");
const ticker = document.getElementById("tickerText");

let videos = [];
let index = 0;

/* ---------------- TICKER ---------------- */

fetch("message.txt")
  .then(res => res.text())
  .then(text => {
    const content = (text.trim() + "     •     ").repeat(20);
    ticker.innerText = content;
    startTicker();
  });

function startTicker() {
  const speed = 180; // 🔥 FINAL SPEED (balanced for TV)

  let position = window.innerWidth;
  let lastTime = performance.now();

  function animate(now) {
    const delta = (now - lastTime) / 1000;
    lastTime = now;

    position -= speed * delta;

    if (position < -ticker.scrollWidth) {
      position = window.innerWidth;
    }

    ticker.style.transform = `translateX(${position}px)`;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

/* ---------------- VIDEO SYSTEM ---------------- */

/* Fix broken encoding */
function fixUrl(url) {
  return url
    .replace(/%E2%94%9C%C2%BA%E2%94%9C%C3%BA/g, "%C3%A7%C3%A3")
    .replace(/%E2%94%9C%C2%BA/g, "%C3%A7")
    .replace(/%E2%94%9C%C3%BA/g, "%C3%A3")
    .replace(/\.{2}\.mp4/g, ".mp4");
}

/* Validate video */
function checkVideo(url) {
  return new Promise(resolve => {
    const v = document.createElement("video");
    v.src = url;
    v.onloadeddata = () => resolve(true);
    v.onerror = () => resolve(false);
  });
}

/* Load videos */
fetch("links.csv")
  .then(res => res.text())
  .then(async data => {
    const lines = data.split(/\r?\n/).slice(1);

    const rawVideos = lines
      .map(l => l.replace(/"/g, "").trim())
      .filter(l => l.length > 10)
      .map(fixUrl);

    for (let url of rawVideos) {
      const ok = await checkVideo(url);
      if (ok) videos.push(url);
    }

    videos = shuffle(videos);

    if (videos.length > 0) {
      playVideo(0);
    } else {
      alert("No valid videos found");
    }
  });

function playVideo(i) {
  if (!videos[i]) return nextVideo();

  player.src = videos[i];
  player.load();

  player.play().catch(() => {
    setTimeout(nextVideo, 500);
  });
}

function nextVideo() {
  index = (index + 1) % videos.length;
  playVideo(index);
}

/* Events */
player.addEventListener("ended", nextVideo);
player.addEventListener("error", nextVideo);

/* Failsafe */
setInterval(() => {
  if (player.paused || player.readyState === 0) {
    nextVideo();
  }
}, 8000);

/* Shuffle */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}
</script>

</body>
</html>
