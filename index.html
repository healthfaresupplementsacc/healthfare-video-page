<script>
const player = document.getElementById("player");

let videos = [];
let index = 0;

/* LOAD CSV */
fetch("links.csv")
  .then(res => res.text())
  .then(data => {
    const lines = data.split(/\r?\n/).slice(1);

    videos = lines
      .map(l => l.replace(/\r/g, "").replace(/"/g, "").trim())
      .filter(l => l.startsWith("http"));

    videos = shuffleArray(videos); // 🔥 RANDOMIZE

    if (videos.length > 0) {
      playVideo(0);
    } else {
      alert("No valid videos");
    }
  });

function playVideo(i) {
  if (!videos[i]) return;

  console.log("PLAYING:", videos[i]);

  player.src = videos[i];
  player.muted = true;
  player.load();

  player.play().catch(() => {
    console.log("Play failed, skipping...");
    nextVideo();
  });
}

/* NEXT VIDEO */
function nextVideo() {
  index = (index + 1) % videos.length;
  playVideo(index);
}

/* AUTO NEXT */
player.addEventListener("ended", nextVideo);

/* 🔥 HANDLE ERRORS (CRITICAL FIX) */
player.addEventListener("error", () => {
  console.log("Video error, skipping...");
  nextVideo();
});

/* SHUFFLE */
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}
</script>
