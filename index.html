<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HealthFare Videos</title>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial;
    }

    .ticker {
      width: 100%;
      overflow: hidden;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      height: 60px;
      display: flex;
      align-items: center;
    }

    .ticker-text {
      white-space: nowrap;
      font-size: 22px;
      font-weight: bold;
      color: #111;
      display: inline-block;
      padding-left: 100%;
      animation: scrollText 60s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    video {
      width: 80%;
      display: block;
      margin: 30px auto;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="ticker">
  <div class="ticker-text" id="tickerText"></div>
</div>

<video id="player" controls autoplay muted></video>

<script>
/* LOAD MESSAGE */
fetch("message.txt")
  .then(res => res.text())
  .then(text => {
    const clean = text.trim();
    // duplicate text so it loops smoothly
    document.getElementById("tickerText").innerText = clean + " • " + clean + " • " + clean;
  });

/* VIDEO PLAYLIST */
const player = document.getElementById("player");

let videos = [];
let index = 0;

fetch("links.csv")
  .then(res => res.text())
  .then(data => {
    const lines = data.split(/\r?\n/).slice(1);

    videos = lines
      .map(l => l.replace(/\r/g, "").trim())
      .filter(l => l.startsWith("http"));

    if (videos.length > 0) {
      playVideo(0);
    }
  });

function playVideo(i) {
  player.src = videos[i];
  player.load();
  player.play().catch(() => {});
}

player.addEventListener("ended", () => {
  index = (index + 1) % videos.length;
  playVideo(index);
});
</script>

</body>
</html>
